
<style>
*{box-sizing:border-box;margin:0;padding:0}
.app{padding:1rem 0;font-family:var(--font-sans)}
.search-bar{display:flex;gap:8px;margin-bottom:1.5rem}
.search-bar input{flex:1;font-size:15px}
.search-bar button{display:flex;align-items:center;gap:6px;padding:0 16px;font-size:14px;white-space:nowrap}
.weather-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1rem}
.city-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px}
.city-name{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.city-date{font-size:12px;color:var(--color-text-tertiary)}
.main-row{display:flex;align-items:center;gap:16px;margin:12px 0}
.temp-big{font-size:52px;font-weight:500;color:var(--color-text-primary);line-height:1}
.weather-icon{font-size:44px;line-height:1}
.condition-text{font-size:15px;color:var(--color-text-secondary);margin-top:4px}
.feels-like{font-size:12px;color:var(--color-text-tertiary);margin-top:2px}
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px}
.metric-label{font-size:11px;color:var(--color-text-tertiary);margin-bottom:3px;display:flex;align-items:center;gap:4px}
.metric-val{font-size:18px;font-weight:500;color:var(--color-text-primary)}
.metric-unit{font-size:11px;color:var(--color-text-secondary);font-weight:400}
.forecast-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:1rem}
.fc-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 8px;text-align:center}
.fc-day{font-size:11px;color:var(--color-text-tertiary);margin-bottom:4px}
.fc-icon{font-size:22px;line-height:1;margin:4px 0}
.fc-hi{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.fc-lo{font-size:12px;color:var(--color-text-tertiary)}
.unit-toggle{display:flex;gap:0;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);overflow:hidden;width:fit-content;margin-bottom:1rem}
.unit-btn{padding:5px 14px;font-size:12px;background:transparent;border:none;cursor:pointer;color:var(--color-text-secondary);transition:background .12s}
.unit-btn.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500}
.section-label{font-size:11px;font-weight:500;color:var(--color-text-tertiary);letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px}
.error-msg{background:var(--color-background-danger);color:var(--color-text-danger);border-radius:var(--border-radius-md);padding:10px 14px;font-size:13px;display:flex;align-items:center;gap:8px;margin-bottom:1rem}
.quick-cities{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem}
.quick-pill{background:transparent;border:0.5px solid var(--color-border-secondary);border-radius:20px;padding:4px 12px;font-size:12px;cursor:pointer;color:var(--color-text-secondary)}
.quick-pill:hover{background:var(--color-background-secondary)}
.loading{text-align:center;padding:2rem;color:var(--color-text-tertiary);font-size:14px}
.api-note{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 14px;font-size:12px;color:var(--color-text-secondary);margin-bottom:1rem;display:flex;align-items:flex-start;gap:8px}
.uv-bar{height:6px;border-radius:3px;background:var(--color-border-tertiary);margin-top:4px;overflow:hidden}
.uv-fill{height:100%;border-radius:3px;transition:width .4s}
</style>

<h2 class="sr-only">Interactive weather app demo — search any city for current conditions and 5-day forecast</h2>

<div class="app" id="app">

<div class="api-note">
  <i class="ti ti-info-circle" style="font-size:15px;flex-shrink:0;margin-top:1px" aria-hidden="true"></i>
  <span>Live demo using Open-Meteo (free, no API key needed). This simulates a Flask + OpenWeatherMap app with real geocoded data.</span>
</div>

<div class="search-bar">
  <input type="text" id="city-input" placeholder="Enter city name..." value="Mumbai" />
  <button id="search-btn" onclick="searchWeather()">
    <i class="ti ti-search" style="font-size:15px" aria-hidden="true"></i>
    Search
  </button>
</div>

<div class="quick-cities">
  <span style="font-size:11px;color:var(--color-text-tertiary);align-self:center">Quick:</span>
  <button class="quick-pill" onclick="loadCity('London')">London</button>
  <button class="quick-pill" onclick="loadCity('New York')">New York</button>
  <button class="quick-pill" onclick="loadCity('Tokyo')">Tokyo</button>
  <button class="quick-pill" onclick="loadCity('Dubai')">Dubai</button>
  <button class="quick-pill" onclick="loadCity('Sydney')">Sydney</button>
  <button class="quick-pill" onclick="loadCity('Paris')">Paris</button>
</div>

<div class="unit-toggle">
  <button class="unit-btn active" id="btn-c" onclick="setUnit('C')">°C</button>
  <button class="unit-btn" id="btn-f" onclick="setUnit('F')">°F</button>
</div>

<div id="output"></div>

</div>

<script>
let unit = 'C';
let lastData = null;

function setUnit(u) {
  unit = u;
  document.getElementById('btn-c').classList.toggle('active', u === 'C');
  document.getElementById('btn-f').classList.toggle('active', u === 'F');
  if (lastData) renderWeather(lastData);
}

function toF(c) { return Math.round(c * 9/5 + 32); }
function tempStr(c) { return unit === 'C' ? Math.round(c) + '°C' : toF(c) + '°F'; }

const weatherMap = {
  0:  {label:'Clear sky', icon:'☀️'},
  1:  {label:'Mainly clear', icon:'🌤️'},
  2:  {label:'Partly cloudy', icon:'⛅'},
  3:  {label:'Overcast', icon:'☁️'},
  45: {label:'Foggy', icon:'🌫️'},
  48: {label:'Icy fog', icon:'🌫️'},
  51: {label:'Light drizzle', icon:'🌦️'},
  53: {label:'Moderate drizzle', icon:'🌦️'},
  55: {label:'Dense drizzle', icon:'🌧️'},
  61: {label:'Slight rain', icon:'🌧️'},
  63: {label:'Moderate rain', icon:'🌧️'},
  65: {label:'Heavy rain', icon:'🌧️'},
  71: {label:'Slight snow', icon:'🌨️'},
  73: {label:'Moderate snow', icon:'❄️'},
  75: {label:'Heavy snow', icon:'❄️'},
  77: {label:'Snow grains', icon:'❄️'},
  80: {label:'Slight showers', icon:'🌦️'},
  81: {label:'Moderate showers', icon:'🌧️'},
  82: {label:'Violent showers', icon:'⛈️'},
  85: {label:'Snow showers', icon:'🌨️'},
  86: {label:'Heavy snow showers', icon:'❄️'},
  95: {label:'Thunderstorm', icon:'⛈️'},
  96: {label:'Thunderstorm w/ hail', icon:'⛈️'},
  99: {label:'Thunderstorm w/ hail', icon:'⛈️'},
};

function getWx(code) {
  return weatherMap[code] || {label:'Unknown', icon:'🌡️'};
}

const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function uvColor(uv) {
  if (uv <= 2) return '#639922';
  if (uv <= 5) return '#EF9F27';
  if (uv <= 7) return '#D85A30';
  return '#E24B4A';
}

function uvLabel(uv) {
  if (uv <= 2) return 'Low';
  if (uv <= 5) return 'Moderate';
  if (uv <= 7) return 'High';
  if (uv <= 10) return 'Very high';
  return 'Extreme';
}

function windDir(deg) {
  const dirs = ['N','NE','E','SE','S','SW','W','NW'];
  return dirs[Math.round(deg / 45) % 8];
}

async function geocode(city) {
  const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`);
  const d = await r.json();
  if (!d.results || !d.results.length) throw new Error('City not found');
  return d.results[0];
}

async function fetchWeather(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,uv_index,surface_pressure,visibility&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,uv_index_max&wind_speed_unit=kmh&timezone=auto&forecast_days=5`;
  const r = await fetch(url);
  return r.json();
}

function showLoading() {
  document.getElementById('output').innerHTML = '<div class="loading"><i class="ti ti-loader" style="font-size:24px;display:block;margin:0 auto 8px" aria-hidden="true"></i>Fetching weather data...</div>';
}

function showError(msg) {
  document.getElementById('output').innerHTML = `<div class="error-msg"><i class="ti ti-alert-circle" style="font-size:16px;flex-shrink:0" aria-hidden="true"></i>${msg}</div>`;
}

function renderWeather(d) {
  lastData = d;
  const c = d.current;
  const daily = d.daily;
  const wx = getWx(c.weather_code);
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-IN', {weekday:'long', day:'numeric', month:'long'});
  const uv = Math.round(c.uv_index || 0);
  const uvPct = Math.min(100, (uv / 12) * 100);

  const fcCards = daily.time.map((t, i) => {
    const dt = new Date(t);
    const fx = getWx(daily.weather_code[i]);
    return `<div class="fc-card">
      <div class="fc-day">${i === 0 ? 'Today' : days[dt.getDay()]}</div>
      <div class="fc-icon">${fx.icon}</div>
      <div class="fc-hi">${tempStr(daily.temperature_2m_max[i])}</div>
      <div class="fc-lo">${tempStr(daily.temperature_2m_min[i])}</div>
    </div>`;
  }).join('');

  const vis = c.visibility != null ? (c.visibility / 1000).toFixed(1) + ' km' : '—';
  const press = c.surface_pressure != null ? Math.round(c.surface_pressure) + ' hPa' : '—';

  document.getElementById('output').innerHTML = `
    <div class="weather-card">
      <div class="city-row">
        <span class="city-name"><i class="ti ti-map-pin" style="font-size:16px;vertical-align:-2px;margin-right:4px" aria-hidden="true"></i>${d.cityName}</span>
        <span class="city-date">${dateStr}</span>
      </div>
      <div class="main-row">
        <div class="weather-icon">${wx.icon}</div>
        <div>
          <div class="temp-big">${tempStr(c.temperature_2m)}</div>
          <div class="condition-text">${wx.label}</div>
          <div class="feels-like">Feels like ${tempStr(c.apparent_temperature)}</div>
        </div>
      </div>
      <div class="metrics-grid">
        <div class="metric">
          <div class="metric-label"><i class="ti ti-droplet" style="font-size:12px" aria-hidden="true"></i> Humidity</div>
          <div class="metric-val">${Math.round(c.relative_humidity_2m)}<span class="metric-unit">%</span></div>
        </div>
        <div class="metric">
          <div class="metric-label"><i class="ti ti-wind" style="font-size:12px" aria-hidden="true"></i> Wind</div>
          <div class="metric-val">${Math.round(c.wind_speed_10m)}<span class="metric-unit"> km/h ${windDir(c.wind_direction_10m)}</span></div>
        </div>
        <div class="metric">
          <div class="metric-label"><i class="ti ti-eye" style="font-size:12px" aria-hidden="true"></i> Visibility</div>
          <div class="metric-val" style="font-size:14px">${vis}</div>
        </div>
        <div class="metric">
          <div class="metric-label"><i class="ti ti-dashboard" style="font-size:12px" aria-hidden="true"></i> Pressure</div>
          <div class="metric-val" style="font-size:13px">${press}</div>
        </div>
      </div>
      <div style="margin-top:12px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px">
        <div class="metric-label" style="margin-bottom:6px"><i class="ti ti-sun" style="font-size:12px" aria-hidden="true"></i> UV Index — ${uv} (${uvLabel(uv)})</div>
        <div class="uv-bar"><div class="uv-fill" style="width:${uvPct}%;background:${uvColor(uv)}"></div></div>
      </div>
    </div>
    <div class="section-label">5-day forecast</div>
    <div class="forecast-row">${fcCards}</div>
    <button style="font-size:12px;display:flex;align-items:center;gap:6px;margin-top:4px" onclick="sendPrompt('How does a Flask weather app work with the OpenWeatherMap API? Show me the Python code. ↗')">
      <i class="ti ti-code" style="font-size:14px" aria-hidden="true"></i> Show me the Flask + Python code ↗
    </button>
  `;
}

async function loadCity(city) {
  document.getElementById('city-input').value = city;
  await searchWeather();
}

async function searchWeather() {
  const city = document.getElementById('city-input').value.trim();
  if (!city) return;
  showLoading();
  try {
    const geo = await geocode(city);
    const wx = await fetchWeather(geo.latitude, geo.longitude);
    wx.cityName = geo.name + (geo.country_code ? ', ' + geo.country_code : '');
    renderWeather(wx);
  } catch(e) {
    showError('City not found. Try a different name or check the spelling.');
  }
}

document.getElementById('city-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchWeather();
});

loadCity('Mumbai');
</script>
