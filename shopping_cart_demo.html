
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); }
  .shop { display: grid; grid-template-columns: 1fr 340px; gap: 20px; padding: 1rem 0; min-height: 600px; }
  .section-label { font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
  .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
  .product-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 14px; cursor: pointer; transition: border-color 0.15s, transform 0.1s; display: flex; flex-direction: column; gap: 8px; }
  .product-card:hover { border-color: var(--color-border-secondary); transform: translateY(-1px); }
  .product-card:active { transform: scale(0.98); }
  .product-emoji { font-size: 32px; line-height: 1; }
  .product-name { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
  .product-meta { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
  .product-price { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
  .product-category { font-size: 11px; color: var(--color-text-tertiary); background: var(--color-background-secondary); padding: 2px 7px; border-radius: 20px; }
  .add-btn { width: 100%; margin-top: 6px; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 7px; font-size: 13px; background: transparent; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); cursor: pointer; color: var(--color-text-secondary); transition: background 0.12s, color 0.12s; }
  .add-btn:hover { background: var(--color-background-info); color: var(--color-text-info); border-color: transparent; }
  .cart-panel { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 16px; display: flex; flex-direction: column; gap: 0; height: fit-content; position: sticky; top: 0; }
  .cart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .cart-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); display: flex; align-items: center; gap: 8px; }
  .cart-count { background: #185FA5; color: #fff; font-size: 11px; font-weight: 500; border-radius: 20px; padding: 1px 7px; min-width: 20px; text-align: center; }
  .clear-btn { font-size: 12px; color: var(--color-text-tertiary); background: none; border: none; cursor: pointer; padding: 2px 4px; border-radius: 4px; }
  .clear-btn:hover { color: var(--color-text-danger); }
  .cart-empty { text-align: center; padding: 32px 0; color: var(--color-text-tertiary); font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .cart-items { display: flex; flex-direction: column; gap: 0; }
  .cart-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .cart-item:last-child { border-bottom: none; }
  .item-emoji { font-size: 22px; flex-shrink: 0; }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-unit-price { font-size: 11px; color: var(--color-text-tertiary); }
  .qty-control { display: flex; align-items: center; gap: 0; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); overflow: hidden; }
  .qty-btn { background: none; border: none; width: 26px; height: 26px; cursor: pointer; font-size: 16px; color: var(--color-text-secondary); display: flex; align-items: center; justify-content: center; transition: background 0.1s; }
  .qty-btn:hover { background: var(--color-background-secondary); }
  .qty-num { font-size: 13px; font-weight: 500; min-width: 22px; text-align: center; color: var(--color-text-primary); }
  .item-total { font-size: 13px; font-weight: 500; color: var(--color-text-primary); min-width: 48px; text-align: right; }
  .cart-divider { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: 12px 0; }
  .summary-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--color-text-secondary); margin-bottom: 6px; }
  .summary-total { display: flex; justify-content: space-between; font-size: 16px; font-weight: 500; color: var(--color-text-primary); margin-top: 8px; }
  .discount-row { display: flex; justify-content: space-between; font-size: 13px; color: #0F6E56; }
  .checkout-btn { margin-top: 14px; width: 100%; padding: 11px; background: #185FA5; color: #fff; border: none; border-radius: var(--border-radius-md); font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .checkout-btn:hover { opacity: 0.88; }
  .checkout-btn:disabled { opacity: 0.4; cursor: default; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #2C2C2A; color: #F1EFE8; font-size: 13px; padding: 9px 18px; border-radius: var(--border-radius-md); opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; white-space: nowrap; z-index: 999; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .promo-row { display: flex; gap: 6px; margin-top: 10px; }
  .promo-input { flex: 1; font-size: 12px; padding: 6px 10px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); background: var(--color-background-secondary); color: var(--color-text-primary); outline: none; }
  .promo-input:focus { border-color: var(--color-border-primary); }
  .promo-apply { font-size: 12px; padding: 6px 10px; background: transparent; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); cursor: pointer; color: var(--color-text-secondary); white-space: nowrap; }
  .promo-apply:hover { background: var(--color-background-secondary); }
  @media (max-width: 600px) { .shop { grid-template-columns: 1fr; } }
</style>

<h2 class="sr-only">Shopping cart demo with products and real-time totals</h2>

<div class="shop" id="app">
  <div>
    <p class="section-label">Products</p>
    <div class="products-grid" id="products-grid"></div>
  </div>
  <div>
    <p class="section-label">Your cart</p>
    <div class="cart-panel">
      <div class="cart-header">
        <span class="cart-title">
          <i class="ti ti-shopping-cart" aria-hidden="true"></i>
          Cart
          <span class="cart-count" id="cart-count">0</span>
        </span>
        <button class="clear-btn" onclick="clearCart()">Clear all</button>
      </div>
      <div id="cart-body"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const products = [
  { id:1, name:'Wireless Headphones', emoji:'🎧', price:79.99, category:'Electronics' },
  { id:2, name:'Running Shoes', emoji:'👟', price:54.99, category:'Footwear' },
  { id:3, name:'Coffee Beans', emoji:'☕', price:18.50, category:'Food' },
  { id:4, name:'Yoga Mat', emoji:'🧘', price:34.99, category:'Fitness' },
  { id:5, name:'Sunglasses', emoji:'🕶️', price:45.00, category:'Accessories' },
  { id:6, name:'Notebook', emoji:'📓', price:12.99, category:'Stationery' },
  { id:7, name:'Water Bottle', emoji:'🧴', price:22.00, category:'Fitness' },
  { id:8, name:'Bluetooth Speaker', emoji:'🔊', price:59.99, category:'Electronics' },
];

let cart = {};
let promoApplied = false;

function fmt(n) { return '$' + n.toFixed(2); }

function renderProducts() {
  const grid = document.getElementById('products-grid');
  grid.innerHTML = products.map(p => `
    <div class="product-card" onclick="addToCart(${p.id})">
      <div class="product-emoji">${p.emoji}</div>
      <div class="product-name">${p.name}</div>
      <div class="product-meta">
        <span class="product-price">${fmt(p.price)}</span>
        <span class="product-category">${p.category}</span>
      </div>
      <button class="add-btn"><i class="ti ti-plus" aria-hidden="true"></i> Add to cart</button>
    </div>
  `).join('');
}

function addToCart(id) {
  const p = products.find(x => x.id === id);
  if (!cart[id]) cart[id] = { ...p, qty: 0 };
  cart[id].qty++;
  renderCart();
  showToast(`${p.emoji} ${p.name} added`);
}

function updateQty(id, delta) {
  if (!cart[id]) return;
  cart[id].qty += delta;
  if (cart[id].qty <= 0) delete cart[id];
  renderCart();
}

function clearCart() {
  cart = {};
  promoApplied = false;
  renderCart();
}

function applyPromo() {
  const code = document.getElementById('promo-input').value.trim().toUpperCase();
  if (code === 'SAVE10') {
    promoApplied = true;
    renderCart();
    showToast('🎉 10% discount applied!');
  } else {
    showToast('Invalid promo code');
  }
}

function renderCart() {
  const items = Object.values(cart);
  const count = items.reduce((s, i) => s + i.qty, 0);
  document.getElementById('cart-count').textContent = count;

  const body = document.getElementById('cart-body');

  if (!items.length) {
    body.innerHTML = `
      <div class="cart-empty">
        <i class="ti ti-shopping-cart-off" style="font-size:32px;color:var(--color-text-tertiary)" aria-hidden="true"></i>
        <span>Your cart is empty</span>
        <span style="font-size:12px">Click any product to add it</span>
      </div>`;
    return;
  }

  const subtotal = items.reduce((s, i) => s + i.price * i.qty, 0);
  const shipping = subtotal > 50 ? 0 : 5.99;
  const discount = promoApplied ? subtotal * 0.10 : 0;
  const total = subtotal - discount + shipping;

  body.innerHTML = `
    <div class="cart-items">
      ${items.map(i => `
        <div class="cart-item">
          <span class="item-emoji">${i.emoji}</span>
          <div class="item-info">
            <div class="item-name">${i.name}</div>
            <div class="item-unit-price">${fmt(i.price)} each</div>
          </div>
          <div class="qty-control">
            <button class="qty-btn" onclick="updateQty(${i.id},-1)" aria-label="decrease">−</button>
            <span class="qty-num">${i.qty}</span>
            <button class="qty-btn" onclick="updateQty(${i.id},1)" aria-label="increase">+</button>
          </div>
          <div class="item-total">${fmt(i.price * i.qty)}</div>
        </div>
      `).join('')}
    </div>
    <hr class="cart-divider">
    <div class="summary-row"><span>Subtotal (${count} item${count !== 1 ? 's' : ''})</span><span>${fmt(subtotal)}</span></div>
    ${discount > 0 ? `<div class="discount-row"><span>Promo SAVE10 (−10%)</span><span>−${fmt(discount)}</span></div>` : ''}
    <div class="summary-row"><span>Shipping${shipping === 0 ? ' 🎉 Free!' : ''}</span><span>${shipping === 0 ? fmt(0) : fmt(shipping)}</span></div>
    ${subtotal <= 50 && subtotal > 0 ? `<div style="font-size:11px;color:var(--color-text-tertiary);margin-top:2px">Add ${fmt(50 - subtotal)} more for free shipping</div>` : ''}
    <div class="summary-total"><span>Total</span><span>${fmt(total)}</span></div>
    <div class="promo-row">
      <input class="promo-input" id="promo-input" placeholder="Promo code" value="${promoApplied ? 'SAVE10' : ''}" ${promoApplied ? 'disabled' : ''}>
      <button class="promo-apply" onclick="applyPromo()" ${promoApplied ? 'disabled' : ''}>Apply</button>
    </div>
    <button class="checkout-btn" onclick="checkout()">
      <i class="ti ti-credit-card" aria-hidden="true"></i>
      Checkout · ${fmt(total)}
    </button>
  `;
}

function checkout() {
  showToast('✅ Order placed! Thanks for shopping.');
  setTimeout(() => { cart = {}; promoApplied = false; renderCart(); }, 1200);
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

renderProducts();
renderCart();
</script>
